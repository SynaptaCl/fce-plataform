<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Harness: html2pdf blank PDF repro</title>
<script src="../node_modules/html2pdf.js/dist/html2pdf.bundle.min.js"></script>
</head>
<body>
<div id="results">running…</div>
<script>
// HTML de muestra equivalente al output de renderFichaCompletaPdf (tablas inline-style)
const SAMPLE_HTML = `
<div style="font-family: Arial, sans-serif; max-width:800px; margin:0 auto; padding:28px 32px; background:#FFFFFF; color:#1E293B;">
  <table style="width:100%; border-collapse:collapse; border-bottom:2px solid #0D9488; margin-bottom:18px;">
    <tr>
      <td style="padding-bottom:14px; vertical-align:middle; width:58px;">
        <div style="width:44px; height:44px; background:#0D9488; border-radius:8px; text-align:center; line-height:44px; font-size:16px; font-weight:700; color:#FFFFFF;">FC</div>
      </td>
      <td style="padding-bottom:14px; vertical-align:middle; padding-left:14px;">
        <div style="font-size:18px; font-weight:700; color:#0F172A;">Clínica de Prueba</div>
      </td>
    </tr>
  </table>
  <h1 style="font-size:20px; font-weight:700; color:#0F172A; text-align:center;">FICHA CLÍNICA ELECTRÓNICA</h1>
  <table style="width:100%; border-collapse:collapse; border:1px solid #E2E8F0;">
    <thead><tr style="background:#F1F5F9;"><th style="padding:4px 8px;">Campo</th><th style="padding:4px 8px;">Valor</th></tr></thead>
    <tbody>
      <tr><td style="padding:4px 8px;">Nombre</td><td style="padding:4px 8px;">Paciente Demo</td></tr>
      <tr style="background:#F8FAFC;"><td style="padding:4px 8px;">RUT</td><td style="padding:4px 8px;">11.111.111-1</td></tr>
    </tbody>
  </table>
</div>`;

const OPTS = {
  margin: [12, 10, 14, 10],
  image: { type: "jpeg", quality: 0.97 },
  html2canvas: { scale: 2, useCORS: true, logging: false },
  jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
  pagebreak: { mode: ["avoid-all", "css", "legacy"] },
};

function countInkPixels(canvas) {
  const ctx = canvas.getContext("2d");
  const { width, height } = canvas;
  if (width === 0 || height === 0) return { width, height, ink: 0 };
  const data = ctx.getImageData(0, 0, width, height).data;
  let ink = 0;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
    // píxel "con tinta": no blanco y no transparente
    if (a > 10 && (r < 245 || g < 245 || b < 245)) ink++;
  }
  return { width, height, ink };
}

async function runVariant(name, buildDom) {
  const { mount, target } = buildDom();
  document.body.appendChild(mount);
  await new Promise((r) => requestAnimationFrame(() => setTimeout(r, 300)));
  let result;
  try {
    const canvas = await html2pdf().set(OPTS).from(target).toCanvas().get("canvas");
    result = { name, ...countInkPixels(canvas) };
  } catch (e) {
    result = { name, error: String(e) };
  }
  document.body.removeChild(mount);
  return result;
}

// Variante A — bug original: estilos de ocultamiento en el MISMO elemento clonado
function variantA() {
  const el = document.createElement("div");
  el.style.cssText = "position:absolute; left:-9999px; top:0; width:210mm;";
  el.innerHTML = SAMPLE_HTML;
  return { mount: el, target: el };
}

// Variante B — fix fallido: fixed + opacity 0 + zIndex -1 en el MISMO elemento clonado
function variantB() {
  const el = document.createElement("div");
  el.style.cssText = "position:fixed; top:0; left:0; width:210mm; opacity:0; z-index:-1; pointer-events:none;";
  el.innerHTML = SAMPLE_HTML;
  return { mount: el, target: el };
}

// Variante C — fix nuevo: wrapper oculto, elemento interno LIMPIO pasado a .from()
function variantC() {
  const wrapper = document.createElement("div");
  wrapper.style.cssText = "position:fixed; top:0; left:0; opacity:0; z-index:-1; pointer-events:none;";
  const inner = document.createElement("div");
  inner.style.cssText = "width:210mm; background:#FFFFFF;";
  inner.innerHTML = SAMPLE_HTML;
  wrapper.appendChild(inner);
  return { mount: wrapper, target: inner };
}

(async () => {
  const out = [];
  out.push(await runVariant("A_original_left-9999", variantA));
  out.push(await runVariant("B_fix_fallido_opacity0", variantB));
  out.push(await runVariant("C_fix_wrapper", variantC));
  window.__HARNESS_RESULTS__ = out;
  document.getElementById("results").textContent = JSON.stringify(out, null, 2);
})();
</script>
</body>
</html>
